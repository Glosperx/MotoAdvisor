<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f1a2e"/>

  <!-- Rear wheel -->
  <circle cx="8" cy="23" r="6" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="8" cy="23" r="1.5" fill="#f59e0b"/>

  <!-- Front wheel -->
  <circle cx="25" cy="23" r="6" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="25" cy="23" r="1.5" fill="#f59e0b"/>

  <!-- Swingarm: rear axle → engine -->
  <line x1="8" y1="23" x2="13" y2="18" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>

  <!-- Tank + seat silhouette -->
  <path d="M13 18 L15 11 L21 11 L23 14 L19 18 Z" fill="#f59e0b"/>

  <!-- Lower frame / engine underside -->
  <line x1="13" y1="18" x2="19" y2="18" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Fork: steering head → front axle -->
  <line x1="23" y1="14" x2="25" y2="23" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>

  <!-- Handlebar -->
  <line x1="21" y1="11" x2="25" y2="8" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
</svg>
