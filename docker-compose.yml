services:

  # ── .NET 8 API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .                          # solution root (needs all 3 projects)
      dockerfile: MotoAdvisor.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Secrets – all provided via .env, never hardcoded here
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-MotoAdvisorAPI}
      Jwt__Audience: ${JWT_AUDIENCE:-MotoAdvisorClient}
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_MINUTES:-60}
      Cors__AllowedOrigin: ${CORS_ORIGIN:-https://motoadvisor.student-dev.ro}
      Gemini__ApiKey: ${GEMINI_API_KEY:-}
      Photos__SourcePath: /app/photos-source
    volumes:
      - photos_source:/app/photos-source    # drop new model photos here
      - photos_wwwroot:/app/wwwroot/photos  # served at /photos/*; persists across restarts
    ports:
      - "127.0.0.1:5000:8080"   # VPS reverse proxy → localhost:5000 → api:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/brands"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── React SPA (nginx) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:80"    # VPS reverse proxy → localhost:3000 → frontend:80
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  photos_source:
  photos_wwwroot:
