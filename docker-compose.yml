name: student-${USER:-glosper}

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: student-${USER:-glosper}-db
    environment:
      POSTGRES_DB: motoadvisor
      POSTGRES_USER: motoadvisor
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - studlab_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motoadvisor -d motoadvisor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── .NET 8 API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .                          # solution root — needs Core + Infrastructure
      dockerfile: MotoAdvisor.API/Dockerfile
    container_name: student-${USER:-glosper}-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=student-${USER:-glosper}-db;Port=5432;Database=motoadvisor;
        Username=motoadvisor;Password=${DB_PASSWORD}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-MotoAdvisorAPI}
      Jwt__Audience: ${JWT_AUDIENCE:-MotoAdvisorClient}
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_MINUTES:-60}
      Cors__AllowedOrigin: ${CORS_ORIGIN:-https://motoadvisor.student-dev.ro}
      Gemini__ApiKey: ${GEMINI_API_KEY:-}
      Photos__SourcePath: /app/photos-source
    volumes:
      - photos:/app/wwwroot/photos
    expose:
      - "8080"
    networks:
      - studlab_net
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/brands"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── React SPA (nginx) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student-${USER:-glosper}-frontend
    expose:
      - "80"
    networks:
      - studlab_net
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

networks:
  studlab_net:
    external: true
    name: studlab_net

volumes:
  db_data:
  photos:
